version: "3.8"

services:
  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - fundo_data:/app/data
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://fundo:${DB_PASSWORD:-fundo}@db:5432/fundo
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-fundo}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=fundo
      - POSTGRES_PASSWORD=${DB_PASSWORD:-fundo}
      - POSTGRES_DB=fundo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fundo.rule=Host(`fundo.dayan.casa`)"
      - "traefik.http.routers.fundo.entrypoints=http"
      - "traefik.http.services.fundo.loadbalancer.server.port=80"

networks:
  coolify:
    external: true

volumes:
  fundo_data:
  postgres_data:
