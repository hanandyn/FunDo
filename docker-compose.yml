services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - questkids_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/questkids.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  questkids_data:
